<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 220" width="880" height="220">
  <defs>

    <style>
      @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&amp;display=swap');
      text { font-family: 'Poppins', 'Segoe UI', sans-serif; }
    </style>

    <!-- Animated pastel gradient: lavender → sky → mint → peach → rose → lavender -->
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%">
        <animate attributeName="stop-color"
          values="#EDE9FE;#DBEAFE;#D1FAE5;#FEF3C7;#FCE7F3;#EDE9FE"
          dur="12s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%">
        <animate attributeName="stop-color"
          values="#DBEAFE;#D1FAE5;#FEF3C7;#FCE7F3;#EDE9FE;#DBEAFE"
          dur="12s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%">
        <animate attributeName="stop-color"
          values="#D1FAE5;#FEF3C7;#FCE7F3;#EDE9FE;#DBEAFE;#D1FAE5"
          dur="12s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <!-- Soft radial vignette — slightly deeper at corners, bright at center -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="75%">
      <stop offset="0%"   stop-color="white" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>

    <!-- Thin animated accent gradient for the divider line -->
    <linearGradient id="line-g" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="white"   stop-opacity="0"/>
      <stop offset="20%">
        <animate attributeName="stop-color"
          values="#A78BFA;#60A5FA;#34D399;#FBBF24;#F472B6;#A78BFA"
          dur="12s" repeatCount="indefinite"/>
      </stop>
      <stop offset="80%">
        <animate attributeName="stop-color"
          values="#60A5FA;#34D399;#FBBF24;#F472B6;#A78BFA;#60A5FA"
          dur="12s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>

  </defs>

  <!-- Animated pastel background -->
  <rect width="880" height="220" fill="url(#g)"/>

  <!-- Radial bright center overlay -->
  <rect width="880" height="220" fill="url(#vignette)"/>

  <!-- Name -->
  <text
    x="440" y="98"
    text-anchor="middle"
    font-size="52"
    font-weight="600"
    letter-spacing="-1.5"
    fill="#1E1B4B">Vidit Gupta</text>

  <!-- Animated color accent divider -->
  <rect x="280" y="112" width="320" height="1.5" fill="url(#line-g)" rx="1"/>

  <!-- Role line -->
  <text
    x="440" y="142"
    text-anchor="middle"
    font-size="13"
    font-weight="400"
    letter-spacing="2.5"
    fill="#4B5563">SECURITY ANALYST  ·  AI BUILDER  ·  FULL-STACK</text>

  <!-- Company / meta -->
  <text
    x="440" y="172"
    text-anchor="middle"
    font-size="12"
    font-weight="300"
    letter-spacing="0.5"
    fill="#6B7280">Snowflake  ·  ex Ernst &amp; Young  ·  Azure · AWS · OneTrust Certified  ·  India</text>

</svg>
