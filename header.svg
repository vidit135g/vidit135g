<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 420" width="880" height="420">
  <defs>

    <!-- Sky: vivid blue at top, fading lighter toward center -->
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#3A8FD4"/>
      <stop offset="50%"  stop-color="#62B3EC"/>
      <stop offset="100%" stop-color="#A8D9F8"/>
    </linearGradient>

    <!-- Deep blue spotlight at top-left corner -->
    <radialGradient id="spotL" cx="0%" cy="0%" r="55%" fx="0%" fy="0%">
      <stop offset="0%"   stop-color="#2570B8" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#3A8FD4"  stop-opacity="0"/>
    </radialGradient>

    <!-- Deep blue spotlight at top-right corner -->
    <radialGradient id="spotR" cx="100%" cy="0%" r="55%" fx="100%" fy="0%">
      <stop offset="0%"   stop-color="#2570B8" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#3A8FD4"  stop-opacity="0"/>
    </radialGradient>

    <!-- Soft card drop-shadow -->
    <filter id="cs" x="-8%" y="-8%" width="120%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#1a2e4a" flood-opacity="0.10"/>
    </filter>

    <!-- Pill shadow (lighter) -->
    <filter id="ps" x="-5%" y="-10%" width="112%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#1a2e4a" flood-opacity="0.08"/>
    </filter>

    <style>
      /* Floating animations — each card on its own phase */
      .f1 { animation: fl 5.5s ease-in-out infinite 0s;   }
      .f2 { animation: fl 5.5s ease-in-out infinite 1.1s; }
      .f3 { animation: fl 5.5s ease-in-out infinite 2.3s; }
      .f4 { animation: fl 5.5s ease-in-out infinite 3.5s; }
      .f5 { animation: fl 5.5s ease-in-out infinite 0.6s; }

      @keyframes fl {
        0%, 100% { transform: translateY(0px);  }
        50%       { transform: translateY(-9px); }
      }

      /* Subtle shimmer on the dome edge */
      .dome-edge { animation: glow 4s ease-in-out infinite alternate; }
      @keyframes glow {
        from { opacity: 0.0; }
        to   { opacity: 0.6; }
      }

      /* Pulse on the role badge dot */
      .dot { animation: pulse 2.4s ease-in-out infinite; }
      @keyframes pulse {
        0%, 100% { r: 4px; opacity: 1; }
        50%       { r: 6px; opacity: 0.6; }
      }
    </style>
  </defs>

  <!-- ─── BACKGROUND ─── -->
  <rect width="880" height="420" fill="url(#sky)"/>
  <rect width="880" height="420" fill="url(#spotL)"/>
  <rect width="880" height="420" fill="url(#spotR)"/>

  <!-- ─── WHITE DOME ─── -->
  <!-- Dome glow / rim (subtle blue edge so it reads against the sky) -->
  <ellipse class="dome-edge" cx="440" cy="680" rx="790" ry="572" fill="none" stroke="#7EC5F4" stroke-width="2"/>
  <!-- Main white dome -->
  <ellipse cx="440" cy="680" rx="788" ry="570" fill="white"/>

  <!-- ─── TOP PILL ─── -->
  <g class="f5" transform="translate(258, 22)">
    <rect width="364" height="44" rx="22" fill="white" filter="url(#ps)"/>
    <circle class="dot" cx="22" cy="22" r="4" fill="#22C55E"/>
    <text x="38" y="27"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif"
          font-size="12.5" fill="#444444" letter-spacing="0.3">
      Security Analyst  ·  AI Builder  ·  Full-Stack
    </text>
  </g>

  <!-- ─── CARD: top-left — Certifications ─── -->
  <g class="f1" transform="translate(30, 68)">
    <rect width="158" height="58" rx="14" fill="white" filter="url(#cs)"/>
    <!-- small icon area -->
    <rect x="12" y="12" width="28" height="28" rx="8" fill="#EDE9FE"/>
    <text x="26" y="31" text-anchor="middle" font-size="14">☁️</text>
    <!-- text -->
    <text x="50" y="26"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="12" font-weight="600" fill="#1a1a1a">Azure · AWS</text>
    <text x="50" y="42"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="10.5" fill="#888888">Cloud Certified</text>
  </g>

  <!-- ─── CARD: top-right — Current role ─── -->
  <g class="f2" transform="translate(610, 62)">
    <rect width="238" height="74" rx="14" fill="white" filter="url(#cs)"/>
    <rect x="12" y="14" width="30" height="30" rx="8" fill="#DBEAFE"/>
    <text x="27" y="34" text-anchor="middle" font-size="16">🏢</text>
    <text x="54" y="28"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="12.5" font-weight="600" fill="#1a1a1a">Security Analyst</text>
    <text x="54" y="44"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="10.5" fill="#777777">Snowflake  ·  ex-Ernst &amp; Young</text>
    <text x="54" y="59"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="10.5" fill="#7C3AED">OneTrust Privacy Fellow</text>
  </g>

  <!-- ─── HEADLINE (on the dome) ─── -->
  <text x="440" y="210"
        text-anchor="middle"
        font-family="Georgia, 'Palatino Linotype', serif"
        font-size="66" font-weight="300"
        letter-spacing="-2"
        fill="#111111">Vidit Gupta</text>

  <!-- Sub-headline -->
  <text x="440" y="255"
        text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif"
        font-size="15.5" fill="#666666" letter-spacing="0.3">
    Building AI agents for security engineering
  </text>

  <!-- Tagline / location -->
  <text x="440" y="280"
        text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif"
        font-size="12.5" fill="#AAAAAA" letter-spacing="0.5">
    India  ·  vidit135g@gmail.com  ·  @J4iGupta
  </text>

  <!-- ─── CARD: bottom-left — Latest project ─── -->
  <g class="f3" transform="translate(24, 318)">
    <rect width="178" height="60" rx="14" fill="white" filter="url(#cs)"/>
    <rect x="12" y="12" width="28" height="28" rx="8" fill="#F3E8FF"/>
    <text x="26" y="31" text-anchor="middle" font-size="14">🤖</text>
    <text x="52" y="27"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="10.5" fill="#8B5CF6" font-weight="600">Latest Project</text>
    <text x="52" y="44"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="12" fill="#1a1a1a" font-weight="500">AI-Security-Copilot</text>
  </g>

  <!-- ─── CARD: bottom-right — GitHub snapshot ─── -->
  <g class="f4" transform="translate(628, 312)">
    <rect width="228" height="74" rx="14" fill="white" filter="url(#cs)"/>
    <rect x="12" y="14" width="28" height="28" rx="8" fill="#DCFCE7"/>
    <text x="26" y="33" text-anchor="middle" font-size="14">📦</text>
    <text x="52" y="28"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="12.5" font-weight="600" fill="#1a1a1a">36 Repositories</text>
    <text x="52" y="44"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="10.5" fill="#777777">Python · TypeScript · Kotlin · Java</text>
    <text x="52" y="59"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="10.5" fill="#777777">61 followers · Active since 2016</text>
  </g>

</svg>
